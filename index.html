<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ultra Neon Dark Dashboard</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <header>
            <h1>Brutalist Core //</h1>
            <p>High-contrast interface with FontAwesome icons</p>
        </header>
        <main class="dashboard-grid">
            <div class="glow-card cyan-theme">
                <div class="card-content">
                    <div class="card-label"><i class="fa-solid fa-gauge"></i> System Throughput</div>
                    <div class="card-value">944.2 Gb/s</div>
                    <div class="card-footer"><i class="fa-solid fa-arrow-up"></i> 12.4% OPTIMAL</div>
                </div>
            </div>
            <div class="glow-card pink-theme">
                <div class="card-content">
                    <div class="card-label"><i class="fa-solid fa-microchip"></i> Active Node Core</div>
                    <div class="card-value">0x7F9B</div>
                    <div class="card-footer"><i class="fa-solid fa-rotate"></i> SYNCING EXTERNAL</div>
                </div>
            </div>
            <div class="glow-card cyan-theme card-large">                                                            
                <div class="card-content">
                    <div class="card-label"><i class="fa-solid fa-network-wired"></i> Neural Network Latency</div>
                    <div class="card-value">0.024 ms</div>
                    <div class="card-footer"><i class="fa-solid fa-arrow-down"></i> 0.001ms GLOBAL AVERAGE</div>
                </div>
            </div>
            <div class="glow-card pink-theme">
                <div class="card-content">
                    <div class="card-label"><i class="fa-solid fa-memory"></i> Memory Allocation</div>
                    <div class="card-value">64.8 GB</div>
                    <div class="card-footer"><i class="fa-solid fa-circle-check"></i> STABLE LOAD</div>
                </div>
            </div>
            <div class="glow-card cyan-theme">
                <div class="card-content">
                    <div class="card-label"><i class="fa-solid fa-shield-halved"></i> Security Protocol</div>
                    <div class="card-value">ACTIVE</div>
                    <div class="card-footer"><i class="fa-solid fa-lock"></i> FIREWALL SHIELDED</div>
                </div>
            </div>
        </main>
    </body>
    </html>
